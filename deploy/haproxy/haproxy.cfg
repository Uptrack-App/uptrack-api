# haproxy.cfg
# HAProxy configuration for Uptrack
# Deploy to: /etc/haproxy/haproxy.cfg on all 3 nodes
#
# This config handles:
# 1. HTTPS termination (port 443 → Phoenix app)
# 2. Database routing (port 6432 → Postgres primary via Patroni)

global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # TLS settings
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
    tune.ssl.default-dh-param 2048

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# =============================================================================
# FRONTEND: HTTPS (Port 443) - Phoenix Application
# =============================================================================

frontend https_in
    bind :443 ssl crt /etc/haproxy/certs/uptrack.app.pem alpn h2,http/1.1
    mode http
    option httplog
    option forwardfor

    # Security headers
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Frame-Options "SAMEORIGIN"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-XSS-Protection "1; mode=block"

    # Health check bypass (don't log health checks)
    acl is_health_check path /healthz
    http-request set-log-level silent if is_health_check

    default_backend phoenix_app

backend phoenix_app
    mode http
    balance roundrobin
    option httpchk GET /healthz
    http-check expect status 200

    # Local Phoenix app (running on same node)
    server local 127.0.0.1:4000 check inter 5s fall 3 rise 2

# =============================================================================
# FRONTEND: HTTP (Port 80) - Redirect to HTTPS
# =============================================================================

frontend http_in
    bind :80
    mode http
    redirect scheme https code 301 if !{ ssl_fc }

# =============================================================================
# FRONTEND: Database Proxy (Port 6432) - Postgres Primary
# =============================================================================

frontend postgres_primary
    bind 127.0.0.1:6432
    mode tcp
    option tcplog
    default_backend postgres_cluster

backend postgres_cluster
    mode tcp
    option tcp-check
    option pgsql-check user postgres

    # Health check via Patroni REST API
    # Primary endpoint returns 200 only if node is current leader
    option httpchk
    http-check send meth GET uri /primary
    http-check expect status 200

    # Node A - Primary candidate (Tailscale IP)
    server node-a 100.A.A.A:5432 check port 8008 inter 5s fall 3 rise 2

    # Node B - Replica (Tailscale IP)
    # Marked as "backup" - only used if node-a is down
    server node-b 100.B.B.B:5432 check port 8008 inter 5s fall 3 rise 2 backup

# =============================================================================
# STATS PAGE (Optional - for monitoring)
# =============================================================================

listen stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 30s
    stats show-legends
    stats show-node

    # Require basic auth (change password!)
    stats auth admin:CHANGE_ME_STATS_PASSWORD
