version: '3.8'

services:
  # ClickHouse for local development
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: uptrack-clickhouse-dev
    ports:
      - "8123:8123"    # HTTP interface
      - "9000:9000"    # Native protocol
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Optional: PostgreSQL for development (if not using system postgres)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: uptrack-postgres-dev
  #   environment:
  #     POSTGRES_USER: uptrack
  #     POSTGRES_PASSWORD: dev_password
  #     POSTGRES_DB: uptrack_dev
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U uptrack"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  clickhouse-data:
    driver: local
  clickhouse-logs:
    driver: local
  # postgres-data:
  #   driver: local
